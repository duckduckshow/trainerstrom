<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Electron Hero – Physik Lernspiel</title>
<style>
body{margin:0;background:#081028;color:white;font-family:Arial}
canvas{display:block;margin:auto;background:#0f1f44}
#ui{position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.5);padding:12px;border-radius:10px}
#level{font-weight:bold;margin-bottom:6px}
</style>
</head>
<body>
<div id="ui">
<div id="level">Level 1 – Leiter</div>
Pfeile: bewegen<br>
Leertaste: Energieblaster<br>
R: Neustart
</div>
<canvas id="game" width="900" height="520"></canvas>
<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const levelLabel=document.getElementById("level")

const keys={}

let bullets=[]
let atoms=[]
let electrons=[]
let resistors=[]
let particles=[]

let level=1
let frame=0
let score=0
let scroll=0

const player={x:120,y:260,r:12,speed:3,shield:0}

/* ---------------- LEVEL CONTROL ---------------- */

function resetLevel(){
player.x=120
player.y=260
atoms=[]
electrons=[]
resistors=[]
bullets=[]
particles=[]
frame=0
}

function nextLevel(){
level++
resetLevel()

if(level===2)levelLabel.textContent="Level 2 – Widerstand"
if(level===3)levelLabel.textContent="Level 3 – Parallelschaltung"
if(level===4)levelLabel.textContent="Level 4 – Lampen-Boss"

if(level>4){
level=1
score=0
levelLabel.textContent="Level 1 – Leiter"
}
}

/* ---------------- SPAWN ---------------- */

function spawnAtom(){
atoms.push({x:canvas.width+20,y:80+Math.random()*360,r:18,vx:2+Math.random()*1.2})
}

function spawnElectron(){
electrons.push({x:canvas.width+20,y:80+Math.random()*360,r:6,vx:3+Math.random()*1.5})
}

function spawnResistor(){
resistors.push({x:canvas.width+20,y:200+Math.random()*120,w:50,h:25,vx:2})
}

function shoot(){
bullets.push({x:player.x+12,y:player.y,vx:7})
}

/* ---------------- UPDATE ---------------- */

function update(){
frame++
scroll+=2

if(level===1){
if(frame%80===0)spawnAtom()
if(frame%60===0)spawnElectron()
}

if(level===2){
if(frame%50===0)spawnAtom()
if(frame%120===0)spawnResistor()
}

if(level===3){
if(frame%50===0)spawnElectron()
}

if(level===4){
if(frame%40===0)spawnAtom()
}

let vx=0
let vy=0

if(keys.ArrowUp)vy=-player.speed
if(keys.ArrowDown)vy=player.speed
if(keys.ArrowLeft)vx=-player.speed
if(keys.ArrowRight)vx=player.speed

player.x+=vx
player.y+=vy

player.x=Math.max(0,Math.min(canvas.width-20,player.x))
player.y=Math.max(60,Math.min(canvas.height-60,player.y))

for(let b of bullets)b.x+=b.vx
for(let a of atoms)a.x-=a.vx
for(let e of electrons)e.x-=e.vx
for(let r of resistors)r.x-=r.vx

bullets=bullets.filter(b=>b.x<canvas.width)
atoms=atoms.filter(a=>a.x>-40)
electrons=electrons.filter(e=>e.x>-40)
resistors=resistors.filter(r=>r.x>-40)

/* collisions */

for(let b of bullets){
for(let i=atoms.length-1;i>=0;i--){
let a=atoms[i]
if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
atoms.splice(i,1)
b.x=1000
score++
}
}
}

for(let a of atoms){
if(Math.hypot(player.x-a.x,player.y-a.y)<a.r+player.r){
resetLevel()
}
}

for(let e of electrons){
if(Math.hypot(player.x-e.x,player.y-e.y)<e.r+player.r){
resetLevel()
}
}

for(let r of resistors){
if(player.x>r.x&&player.x<r.x+r.w&&player.y>r.y&&player.y<r.y+r.h){
resetLevel()
}
}

/* level completion */

if(frame>2000)nextLevel()

/* particle trail */

particles.push({x:player.x-6,y:player.y+(Math.random()*6-3),life:25})

for(let i=particles.length-1;i>=0;i--){
particles[i].x-=2
particles[i].life--
if(particles[i].life<=0)particles.splice(i,1)
}
}

/* ---------------- DRAW HERO SPRITE ---------------- */

function drawHero(){

/* cape */
ctx.fillStyle="red"
ctx.beginPath()
ctx.moveTo(player.x-10,player.y)
ctx.lineTo(player.x-18,player.y+10)
ctx.lineTo(player.x-18,player.y-10)
ctx.fill()

/* body */
ctx.fillStyle="#4fc3ff"
ctx.fillRect(player.x-6,player.y-8,12,16)

/* head */
ctx.fillStyle="#ffe0b0"
ctx.beginPath()
ctx.arc(player.x,player.y-12,6,0,Math.PI*2)
ctx.fill()

/* emblem */
ctx.fillStyle="yellow"
ctx.fillRect(player.x-2,player.y-2,4,4)

if(player.shield){
ctx.strokeStyle="yellow"
ctx.lineWidth=3
ctx.beginPath()
ctx.arc(player.x,player.y,18,0,Math.PI*2)
ctx.stroke()
}
}

/* ---------------- BACKGROUND ---------------- */

function drawBackground(){
ctx.fillStyle="#0f1f44"
ctx.fillRect(0,0,canvas.width,canvas.height)

for(let i=0;i<30;i++){
let x=i*120-(scroll%120)
ctx.fillStyle="#6f95e7"
ctx.fillRect(x,60,60,400)
}

ctx.strokeStyle="#88aaff"
ctx.lineWidth=6
ctx.strokeRect(0,60,canvas.width,canvas.height-120)
}

/* ---------------- BOSS LAMP ---------------- */

function drawBossLamp(){
let x=canvas.width-80
let y=260

ctx.fillStyle="#fff"
ctx.beginPath()
ctx.arc(x,y,25,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#999"
ctx.fillRect(x-10,y+25,20,30)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(x,y,10+Math.sin(frame*0.2)*3,0,Math.PI*2)
ctx.fill()
}

/* ---------------- PACMAN PARALLEL CIRCUIT ---------------- */

function drawParallelCircuit(){

ctx.strokeStyle="#7fb7ff"
ctx.lineWidth=8

ctx.beginPath()
ctx.moveTo(100,260)
ctx.lineTo(300,260)

ctx.moveTo(300,260)
ctx.lineTo(300,150)

ctx.moveTo(300,260)
ctx.lineTo(300,370)

ctx.moveTo(300,150)
ctx.lineTo(650,150)

ctx.moveTo(300,370)
ctx.lineTo(650,370)

ctx.moveTo(650,150)
ctx.lineTo(650,260)
ctx.moveTo(650,370)
ctx.lineTo(650,260)

ctx.lineTo(820,260)
ctx.stroke()
}

/* ---------------- DRAW ---------------- */

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

if(level===3)drawParallelCircuit()

if(level===4)drawBossLamp()

for(let p of particles){
ctx.fillStyle="rgba(120,240,255,"+(p.life/25)+")"
ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fill()
}

for(let e of electrons){
ctx.fillStyle="#7cf0ff"
ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()
}

for(let a of atoms){
ctx.fillStyle="#ff6a8b"
ctx.beginPath()
ctx.arc(a.x,a.y,a.r,0,Math.PI*2)
ctx.fill()
}

for(let r of resistors){
ctx.fillStyle="#e6a85b"
ctx.fillRect(r.x,r.y,r.w,r.h)
}

for(let b of bullets){
ctx.fillStyle="yellow"
ctx.fillRect(b.x-2,b.y-2,6,4)
}

/* battery */
ctx.fillStyle="#f45e79"
ctx.fillRect(10,230,20,80)
ctx.fillStyle="#8ad3ff"
ctx.fillRect(32,220,30,100)

drawHero()

ctx.fillStyle="white"
ctx.fillText("Score: "+score,760,30)
}

/* ---------------- LOOP ---------------- */

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

window.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.key===" ")shoot()
if(e.key==="r"||e.key==="R")resetLevel()
})

window.addEventListener("keyup",e=>keys[e.key]=false)

resetLevel()
loop()
</script>
</body>
</html>
